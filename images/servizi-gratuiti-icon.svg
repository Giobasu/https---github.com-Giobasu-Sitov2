<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 440" width="440" height="440">
  <defs>
    <clipPath id="vc">
      <circle cx="220" cy="215" r="145"/>
    </clipPath>
  </defs>

  <!-- Ball fill -->
  <circle cx="220" cy="215" r="145" fill="white"/>

  <!-- Three volleyball seams, clipped inside the ball -->
  <g clip-path="url(#vc)" fill="none" stroke="#1a8a7d" stroke-width="9" stroke-linecap="round">
    <!-- Seam 1: horizontal S-curve left to right -->
    <path d="M75,215 C120,155 165,275 220,215 C275,155 320,275 365,215"/>
    <!-- Seam 2: upper-right arc to lower-left -->
    <path d="M346,143 C298,178 258,205 220,215 C182,225 144,252 94,287"/>
    <!-- Seam 3: upper-left arc to lower-right (mirror of seam 2) -->
    <path d="M94,143 C142,178 182,205 220,215 C258,225 296,252 346,287"/>
  </g>

  <!-- Ball outline -->
  <circle cx="220" cy="215" r="145" fill="none" stroke="#1a8a7d" stroke-width="10"/>
</svg>
